services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: project_os
      POSTGRES_USER: project_os
      POSTGRES_PASSWORD: local_project_os_password
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - project_os_data:/var/lib/postgresql/data
volumes:
  project_os_data: