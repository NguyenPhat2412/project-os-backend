# Immutable-release override. IMAGE_TAG must be the tested Git commit SHA published by backend-ci.
services:
  identity-service:
    build: !reset null
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/project-os-identity-service:${IMAGE_TAG:?IMAGE_TAG is required}
  organization-service:
    build: !reset null
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/project-os-organization-service:${IMAGE_TAG:?IMAGE_TAG is required}
