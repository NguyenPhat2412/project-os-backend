  api-gateway:
    build: !reset null
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/project-os-api-gateway:${IMAGE_TAG:?IMAGE_TAG is required}
