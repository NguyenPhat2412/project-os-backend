    build: !reset null
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/project-os-project-service:${IMAGE_TAG:?IMAGE_TAG is required}
  work-service:
    build: !reset null
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/project-os-work-service:${IMAGE_TAG:?IMAGE_TAG is required}
  operations-service:
    build: !reset null
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}/project-os-operations-service:${IMAGE_TAG:?IMAGE_TAG is required}
