name: backend-ci

on:
  pull_request:
  push:
    branches: [main, master, feat/**]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: bash ./mvnw -B -q test
      - run: docker compose -f compose.yaml config --quiet

  image-build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        module: [identity-service, organization-service, attendance-service, project-service, work-service, operations-service, knowledge-service, activity-service, api-gateway]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build tested image and publish immutable main release
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: MODULE=${{ matrix.module }}
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          tags: ghcr.io/nguyenphat2412/project-os-${{ matrix.module }}:${{ github.sha }}
