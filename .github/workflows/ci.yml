name: backend-ci

on:
  pull_request:
  push:
    branches: [main, master, feat/**]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B -q test
      - run: docker compose -f compose.yaml config --quiet

  image-build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [identity-service, project-service, work-service, operations-service, knowledge-service, activity-service, api-gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build --build-arg MODULE=${{ matrix.module }} -t project-os/${{ matrix.module }}:${{ github.sha }} .
