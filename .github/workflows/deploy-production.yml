name: deploy-production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Tested Git commit SHA to deploy
        required: true
        default: main
      image_tag:
        description: Immutable GHCR image tag built by backend-ci (normally the same commit SHA)
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts
      - name: Deploy ProjectOS only
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_REF: ${{ inputs.ref }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
        run: |
          {
            printf 'DEPLOY_PATH=%q\n' "$DEPLOY_PATH"
            printf 'DEPLOY_REF=%q\n' "$DEPLOY_REF"
            printf 'IMAGE_TAG=%q\n' "$IMAGE_TAG"
            printf 'IMAGE_NAMESPACE=%q\n' "$IMAGE_NAMESPACE"
            cat <<'REMOTE'
          set -eu
          cd "$DEPLOY_PATH"
          test -z "$(git status --porcelain)"
          git rev-parse HEAD > .previous-deploy-ref
          git fetch origin "$DEPLOY_REF"
          git checkout --detach FETCH_HEAD
          DEPLOY_REF="$(git rev-parse HEAD)" IMAGE_TAG="$IMAGE_TAG" IMAGE_NAMESPACE="$IMAGE_NAMESPACE" PROJECT_OS_ENV_FILE="$DEPLOY_PATH/.env.production" bash ./deploy/release/deploy-image.sh
          docker compose --env-file .env.production -f compose.yaml -f compose.prod.yaml -f compose.release.yaml ps
          REMOTE
          } | ssh "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s'
