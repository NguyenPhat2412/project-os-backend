name: deploy-production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts
      - name: Deploy ProjectOS only
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "set -eu; cd '$DEPLOY_PATH'; test -z \"\$(git status --porcelain)\"; git rev-parse HEAD > .previous-deploy-ref; PROJECT_OS_ENV_FILE='$DEPLOY_PATH/.env.production' ./deploy/backup/backup-project-os.sh; git fetch origin '$DEPLOY_REF'; git checkout --detach FETCH_HEAD; docker compose --parallel 1 --env-file .env.production -f compose.yaml -f compose.prod.yaml up -d --build --wait --wait-timeout 300; curl -fsS http://127.0.0.1:18080/actuator/health; docker compose --env-file .env.production -f compose.yaml -f compose.prod.yaml ps"
