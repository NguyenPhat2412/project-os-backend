server.port: ${SERVER_PORT:8087}
spring:
  application.name: organization-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/project_os}
    username: ${ORGANIZATION_DB_USERNAME:organization_app}
    password: ${ORGANIZATION_DB_PASSWORD:local_organization_password}
    hikari.maximum-pool-size: ${DB_POOL_SIZE:5}
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 500ms
    repositories.enabled: false
  flyway:
    create-schemas: true
    default-schema: organization
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
    properties.hibernate.default_schema: organization
    properties.hibernate.type.json_format_mapper: jackson3
management.endpoints.web.exposure.include: health,info
management.tracing.sampling.probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.export.zipkin.endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
springdoc.api-docs.enabled: ${OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled: ${OPENAPI_ENABLED:false}
app:
  jwt.secret: ${JWT_SECRET:local-development-jwt-secret-32-characters-minimum}
  internal-token: ${INTERNAL_SERVICE_TOKEN:local-internal-service-token-change-me}
  workspace-cache:
    enabled: ${WORKSPACE_CACHE_ENABLED:true}
    ttl-seconds: ${WORKSPACE_CACHE_TTL_SECONDS:30}
