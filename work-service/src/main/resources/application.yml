server.port: ${SERVER_PORT:8083}
spring:
  application.name: work-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/project_os}
    username: ${WORK_DB_USERNAME:project_os}
    password: ${WORK_DB_PASSWORD:local_project_os_password}
    hikari.maximum-pool-size: ${DB_POOL_SIZE:5}
  flyway:
    create-schemas: true
    default-schema: work
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
    properties.hibernate.default_schema: work
management.endpoints.web.exposure.include: health,info
app:
  jwt.secret: ${JWT_SECRET:local-development-jwt-secret-32-characters-minimum}
  resources: tasks,task-columns,sprints,epics,user-stories,bugs,bug-columns
