server.port: ${SERVER_PORT:8082}

spring:
  application.name: project-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/project_os}
    username: ${PROJECT_DB_USERNAME:project_os}
    password: ${PROJECT_DB_PASSWORD:local_project_os_password}
    hikari.maximum-pool-size: ${DB_POOL_SIZE:5}
  flyway:
    create-schemas: true
    default-schema: project
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
    properties.hibernate.default_schema: project

management.endpoints.web.exposure.include: health,info
app.jwt.secret: ${JWT_SECRET:local-development-jwt-secret-32-characters-minimum}
